<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redstone to Real - Graph Visualizer</title>
    <style>
         body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #f5f5f5; padding: 20px; }
              h1 { color: #e74c3c; border-bottom: 2px solid #333; padding-bottom: 10px; }              #svg_container { border: 1px solid #333; margin-top: 20px; width: 100%; height: 600px; background-color: #1e1e1e; border-radius: 8px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
          button { background-color: #27ae60; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
          button:hover { background-color: #2ecc71; }
         input[type="file"] { background-color: #333; color: white; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Redstone Logic Synthesizer</h1>
  <div>
      <input type="file" id="jsonUpload" accept=".json" oncharge="ingestFile(event)">
      </div>
<br>
  
    <button onclick="synthesize()">Run Isomorphic Matcher</button>
    <button onclick="generateCPP()">Generate Arduino Code</button>
    <button onclick="copyCPP()">Copy C++</button>
  
    <div id="svg_container"></div>
     <pre id="cpp_out" style="background: #000; padding: 10px; border: 1px solid #444; margin-top: 20px;"></pre>

    <script src="synth.js"></script>
    <script>
         function ingestFile(event) {
           let file = event.target.files[0];
           if (!file) return;
             let reader = new FileReader();
             reader.onload = function(e) {
            try {
           let parsed = JSON.parse(e.target.result);
          sampleJSON = parsed;
          console.log("Ingested real DAG file successfully");
            } catch (err) {
           alert("JSON parse error from the file. ugh");
            }
        };
            reader.readAsText(file);
    }

         function copyCPP() {
     let code = document.getElementById("cpp_out").innerText;
       navigator.clipboard.writeText(code);
        alert("Copied to clipboard!");
         }
</script>
</body>
</html>
